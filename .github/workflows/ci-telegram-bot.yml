name: CI — telegram-bot

on:
  push:
    paths:
      - "apps/telegram-bot/**"
      - ".github/workflows/ci-telegram-bot.yml"
  pull_request:
    paths:
      - "apps/telegram-bot/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/telegram-bot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          pip install -r requirements.txt
          pytest tests/ -q
