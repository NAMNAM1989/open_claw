name: CI — plugins

on:
  push:
    paths:
      - "plugins/**"
      - ".github/workflows/ci-plugins.yml"
  pull_request:
    paths:
      - "plugins/**"

jobs:
  cursor-agent:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/cursor-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: plugins/cursor-agent/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  vietnam-legal-research:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/vietnam-legal-research
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: plugins/vietnam-legal-research/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
